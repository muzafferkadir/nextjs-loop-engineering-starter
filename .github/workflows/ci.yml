name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: loop guards · verify pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # guards diff against the branch point

      # pnpm version comes from the packageManager field in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Loop state check
        run: bash scripts/check-loop-state.sh

      - name: Commit attribution check
        run: bash scripts/check-commits.sh

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Same entry point the verifier agent and humans use locally:
      # denylist → typecheck → lint → unit → build → e2e → secret/any scan
      - name: Verify
        run: pnpm verify

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
